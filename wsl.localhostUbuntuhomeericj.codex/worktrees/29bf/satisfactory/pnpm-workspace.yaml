allowBuilds:
  # bundler native compiles needed by the Vite/Tailwind toolchain
  esbuild: true
  # Cloudflare Workers local runtime (wrangler dev / miniflare) and its
  # native image dependency
  workerd: true
  sharp: true
  # telemetry-notice postinstall only, not a build - default-deny
  '@clerk/shared': false

minimumReleaseAge: 4320 # 3 days - blocks the worm/account-takeover window
minimumReleaseAgeExclude:
  - "@appelent/*" # our own registry, always trusted

overrides:
  # @appelent/auth depends on lucide-react ^1.20.0; the resolved 1.22.0
  # (published 2026-06-28) falls inside the minimumReleaseAge cooldown.
  # Pin to 1.21.0 (published 2026-06-18), which still satisfies that range.
  lucide-react@^1.20.0: 1.21.0
